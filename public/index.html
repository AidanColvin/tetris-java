<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tetris</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="brand">
            <h1>Tetris</h1>
        </header>

        <div class="hud">
            <div class="chip">
                <span class="chip-label">Hold</span>
                <canvas id="hold" width="128" height="104"></canvas>
            </div>
            <div class="scoreboard">
                <div class="score" id="score">0</div>
                <div class="submeta">
                    <span>Level <b id="level">1</b></span>
                    <span class="dot">·</span>
                    <span><b id="lines">0</b> lines</span>
                </div>
            </div>
            <div class="chip">
                <span class="chip-label">Next</span>
                <canvas id="next" width="336" height="104"></canvas>
            </div>
        </div>

        <main class="playfield">
            <canvas id="board" width="300" height="600"></canvas>
            <div id="overlay" class="overlay">
                <div class="overlay-card">
                    <h2 id="overlay-title">Ready to play?</h2>
                    <p id="overlay-text">Clear lines, climb the levels, beat the board.</p>
                    <button id="start-btn" class="btn-primary">Start Game</button>
                </div>
            </div>
        </main>

        <section class="touch" id="touch" aria-label="Touch controls">
            <div class="pad pad-move">
                <button class="ctrl" id="btn-left" aria-label="Move left">
                    <svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg>
                </button>
                <button class="ctrl" id="btn-down" aria-label="Soft drop">
                    <svg viewBox="0 0 24 24"><path d="M5 9l7 7 7-7"/></svg>
                </button>
                <button class="ctrl" id="btn-right" aria-label="Move right">
                    <svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
                </button>
            </div>
            <div class="pad pad-act">
                <button class="ctrl" id="btn-hold" aria-label="Hold">
                    <svg viewBox="0 0 24 24"><rect x="4.5" y="6.5" width="15" height="11" rx="2.5"/><path d="M9 17.5v-11M15 17.5v-11"/></svg>
                </button>
                <button class="ctrl" id="btn-rotate" aria-label="Rotate">
                    <svg viewBox="0 0 24 24"><path d="M5.5 9.5a7 7 0 1 1-1 5.5"/><path d="M3 4.5l1 5 5-1"/></svg>
                </button>
                <button class="ctrl ctrl-primary" id="btn-drop" aria-label="Hard drop">
                    <svg viewBox="0 0 24 24"><path d="M12 3v11M7.5 10l4.5 4.5L16.5 10M6 20h12"/></svg>
                </button>
            </div>
        </section>

        <section class="footer">
            <p class="kbd-hints">
                <kbd>&larr;</kbd><kbd>&rarr;</kbd> Move&nbsp;&nbsp;<kbd>&darr;</kbd> Soft drop&nbsp;&nbsp;<kbd>&uarr;</kbd>/<kbd>X</kbd> Rotate&nbsp;&nbsp;<kbd>Z</kbd> CCW&nbsp;&nbsp;<kbd>Space</kbd> Drop&nbsp;&nbsp;<kbd>C</kbd> Hold
            </p>
            <div class="card leaderboard">
                <h2>Leaderboard</h2>
                <ol id="leaderboard"><li class="empty">No scores yet</li></ol>
            </div>
        </section>
    </div>

    <script src="game.js"></script>
</body>
</html>
